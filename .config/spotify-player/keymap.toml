# Navigation (Vim-style to avoid the arrow key parser bug)
[[keymaps]]
command = "SelectNextOrScrollDown"
key_sequence = "j"

[[keymaps]]
command = "SelectPreviousOrScrollUp"
key_sequence = "k"

[[keymaps]]
command = "ChooseSelected"
key_sequence = "enter"

[[keymaps]]
command = "PreviousPage"
key_sequence = "backspace"

# Playback
[[keymaps]]
command = "ResumePause"
key_sequence = "space"

[[keymaps]]
command = "NextTrack"
key_sequence = "n"

[[keymaps]]
command = "PreviousTrack"
key_sequence = "p"

# Essentials (Search & Lyrics)
[[keymaps]]
command = "SearchPage"
key_sequence = "f"

[[keymaps]]
command = "LyricsPage"
key_sequence = "l"

# Playlist / Actions Menu
[[keymaps]]
command = "ShowActionsOnSelectedItem"
key_sequence = "a"

# System
[[keymaps]]
command = "FocusNextWindow"
key_sequence = "tab"

[[keymaps]]
command = "SwitchDevice"
key_sequence = "d"

[[keymaps]]
command = "Quit"
key_sequence = "q"

[[keymaps]]
command = "BrowsePage"
key_sequence = "w"
