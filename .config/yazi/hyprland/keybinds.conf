##! Shell
# Launcher
bind = SUPER, SUPER_L, exec, ags toggle launcher
bind = SUPER, SUPER_R, exec, ags toggle launcher

# Clipboard
bind = Super, V, exec, cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy

# Emoji
bind = Super, Period, exec, ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy

# Sidebar toggles (AGS)
#bind = Super, A, exec, ags toggle sideleft #TODO
#bind = Super, N, exec, ags toggle sideright  #TODO

# Session menu
bind = Ctrl+Alt, Delete, exec, wlogout -p layer-shell

# Increase Brightness
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+  
# Reduce Brightness
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-   

# Volume Up
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5 
# Volume Down  
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-  
# Mute/Unmute 
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
# Mute/Unmute   
bindl = Super+Shift, M, exec, wpctl set-mute @DEFAULT_SINK@ toggle  
# Mute/Unmute Microphone 
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle   

##! Utilities
# Screenshot — region → clipboard (freeze screen while selecting)
bind = Super+Shift, S, exec, hyprshot --freeze --clipboard-only --mode region
# Screenshot — region → Google image search
bind = Super+Shift, A, exec, ~/.config/hypr/hyprland/scripts/snip_to_search.sh
# Screenshot — region → OCR text → clipboard
bind = Super+Shift, X, exec, grim -g "$(slurp)" "/tmp/ocr_image.png" && tesseract "/tmp/ocr_image.png" stdout | wl-copy && rm "/tmp/ocr_image.png"
# Color picker — pick any pixel color → clipboard
bind = Super+Shift, C, exec, hyprpicker -a
# Screenshot — fullscreen → clipboard
bindl = , Print, exec, grim - | wl-copy
# Screenshot — fullscreen → save to ~/Pictures/Screenshots
bindl = Ctrl, Print, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png

# Cheat sheet
bind = Super, slash, exec, ags toggle cheatsheet

# Choose Wallpaper
bind = Ctrl+Super, T, exec, waypaper
# Choose Random Wallpaper
bind = Ctrl+Super+Alt, T, exec, waypaper --random  

# Recording
#bind = Super+Shift, R, exec, ~/.config/hypr/hyprland/scripts/record.sh  # TODO
#bind = Super+Shift+Alt, R, exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen --sound  # TODO

##! Window
# Move Window
bindm = Super, mouse:272, movewindow
# Resize Window
bindm = Super, mouse:273, resizewindow

# Focus Left
bind = Super, Left, movefocus, l
# Focus Right
bind = Super, Right, movefocus, r
# Focus Up
bind = Super, Up, movefocus, u
# Focus Down
bind = Super, Down, movefocus, d

# Move Left
bind = Super+Shift, Left, movewindow, l
# Move Right
bind = Super+Shift, Right, movewindow, r
# Move Up
bind = Super+Shift, Up, movewindow, u
# Move Down
bind = Super+Shift, Down, movewindow, d

# Close Focused Active Window
bind = Super, Q, killactive
# Crosshair Kill any Window
bind = Super+Shift+Alt, Q, exec, hyprctl kill

# Split ratio
# binde = Super, Semicolon, splitratio, -0.1  # TODO
# binde = Super, Apostrophe, splitratio, +0.1 # TODO

# Toggle Floating Window
bind = Super+Alt, Space, togglefloating
# Maximize Window
bind = Super, D, fullscreen, 1
# Fullscreen
bind = Super, F, fullscreen, 0
# Hides Decorations/Interface Elements
bind = Super+Alt, F, fullscreenstate, 0 3
# Pin Window
bind = Super, P, pin

# Send to workspace 1
bind = Super+Alt, code:10, movetoworkspacesilent, 1
# Send to workspace 2
bind = Super+Alt, code:11, movetoworkspacesilent, 2
# Send to workspace 3
bind = Super+Alt, code:12, movetoworkspacesilent, 3
# Send to workspace 4
bind = Super+Alt, code:13, movetoworkspacesilent, 4
# Send to workspace 5
bind = Super+Alt, code:14, movetoworkspacesilent, 5
# Send to workspace 6
bind = Super+Alt, code:15, movetoworkspacesilent, 6
# Send to workspace 7
bind = Super+Alt, code:16, movetoworkspacesilent, 7
# Send to workspace 8
bind = Super+Alt, code:17, movetoworkspacesilent, 8
# Send to workspace 9
bind = Super+Alt, code:18, movetoworkspacesilent, 9
# Send to workspace 10
bind = Super+Alt, code:19, movetoworkspacesilent, 10

# Move Window to Prev. Relative Workspace
bind = Super+Shift, mouse_down, movetoworkspace, r-1
# Move Window to Next Relative Workspace
bind = Super+Shift, mouse_up, movetoworkspace, r+1
# Move Window to Next Explicit Workspace
bind = Super+Alt, Page_Down, movetoworkspace, +1
# Move Window to Prev. Explicit Workspace
bind = Super+Alt, Page_Up, movetoworkspace, -1

##! Scratchpad
# Send Window to Scratchpad
bind = Super+Alt, S, movetoworkspacesilent, special
# Open OR Close Scratchpad
bind = Super, S, togglespecialworkspace
# Move From Scratchpad to Workspace 1
bind = Super+Shift, 1, movetoworkspace, 1
# Move From Scratchpad to Workspace 2
bind = Super+Shift, 2, movetoworkspace, 2
# Move From Scratchpad to Workspace 3
bind = Super+Shift, 3, movetoworkspace, 3
# Move From Scratchpad to Workspace 4
bind = Super+Shift, 4, movetoworkspace, 4
# Move From Scratchpad to Workspace 5
bind = Super+Shift, 5, movetoworkspace, 5
# Move From Scratchpad to Workspace 6
bind = Super+Shift, 6, movetoworkspace, 6
# Move From Scratchpad to Workspace 7
bind = Super+Shift, 7, movetoworkspace, 7
# Move From Scratchpad to Workspace 8
bind = Super+Shift, 8, movetoworkspace, 8
# Move From Scratchpad to Workspace 9
bind = Super+Shift, 9, movetoworkspace, 9
# Move From Scratchpad to Workspace 10
bind = Super+Shift, 10, movetoworkspace, 10

##! Workspace
# Focus workspace 1
bind = Super, code:10, workspace, 1
# Focus workspace 2
bind = Super, code:11, workspace, 2
# Focus workspace 3
bind = Super, code:12, workspace, 3
# Focus workspace 4
bind = Super, code:13, workspace, 4
# Focus workspace 5
bind = Super, code:14, workspace, 5
# Focus workspace 6
bind = Super, code:15, workspace, 6
# Focus workspace 7
bind = Super, code:16, workspace, 7
# Focus workspace 8
bind = Super, code:17, workspace, 8
# Focus workspace 9
bind = Super, code:18, workspace, 9
# Focus workspace 10
bind = Super, code:19, workspace, 10

# Navigate Workspaces Right
bind = Ctrl+Super, Right, workspace, r+1
# Navigate Workspaces Left
bind = Ctrl+Super, Left, workspace, r-1

##! Session
bind = Super, L, exec, loginctl lock-session
bind = Super+Shift, L, exec, systemctl suspend || loginctl suspend
bind = Ctrl+Shift+Alt+Super, Delete, exec, systemctl poweroff || loginctl poweroff

##! Screen zoom
# Zoom-out
binde = Super, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.3
# Zoom-in
binde = Super, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.3

##! Media
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop

##! Apps
bind = Super, Return, exec, kitty
bind = Super, T, exec, kitty
bind = Super, W, exec, zen-browser
bind = Super, E, exec, kitty zsh -c yazi
bind = Super, C, exec, kitty nvim
bind = Ctrl+Super, V, exec, pavucontrol
bind = Ctrl+Shift, Escape, exec, kitty zsh -c btop
bind = Super, Z, exec, spotify
bind = Super, U, exec, kitty zsh -c neomutt
bind = Ctrl+Super+Shift+Alt, W, exec, onlyoffice-desktopeditors