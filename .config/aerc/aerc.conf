
[general]
default-save-path=~/Downloads

[ui]
styleset-name=custom
# Minimal index
index-columns=flags:4,name<25%,subject<50%,date:15
timestamp-format=2006 Jan 02
this-day-time-format=15:04
sidebar-width=20
mouse-enabled=false
new-message-bell=true
threading-enabled=false
next-message-on-delete=true
auto-mark-read=true
show-preview=true

[statusline]
status-columns=left<*,center:=,right>*
column-left=[{{.Account}}] {{.StatusInfo}}
column-center={{.PendingKeys}}
column-right={{.TrayInfo}}

[viewer]
pager=
alternatives=text/html,text/plain
show-headers=false
header-layout=From,Date,Subject
parse-http-links=true

[compose]
header-layout=To,Subject
reply-to-self=true
empty-subject-warning=false

[filters]
application/vnd.openxmlformats-officedocument.wordprocessingml.document = pandoc -f docx -t plain - | bat -p
text/html=lynx -dump -force_html -nonumbers -stdin
text/plain=colorize
text/plain=bat
text/*=bat -fP --file-name="$AERC_FILENAME"
.headers=colorize

[openers]
application/vnd.openxmlformats-officedocument.wordprocessingml.document = pandoc -f docx -t plain "{}" | bat
text/*=bat --paging=always {}
image/* = kitty +kitten icat --hold {}
application/pdf=zathura {}
* = handlr {}

[hooks]
# mail-received=notify-send "New mail from $AERC_FROM_NAME" "$AERC_SUBJECT"
