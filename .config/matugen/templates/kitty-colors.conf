$kitty-bg: #080808;

# Base - dark & stable background (matches AGS/wallpaper)
foreground            {{colors.on_surface.default.hex}}
background            #080808
selection_foreground  {{colors.on_primary.default.hex}}
selection_background  {{colors.primary.default.hex}}

cursor                {{colors.primary.default.hex}}
cursor_text_color     {{colors.on_primary.default.hex}}

# ANSI colors
color0  {{colors.surface_container_lowest.default.hex}}   # very dark
color1  {{colors.error.default.hex}}                      # pink/red accents
color2  {{colors.secondary.default.hex}}                  # blue/teal from wallpaper
color3  {{colors.tertiary.default.hex}}
color4  {{colors.primary.default.hex}}                    # main accent

# Headings - BRIGHT + DISTINCT (this is the key part you asked for)
color5  {{colors.primary.default.hex}}                    # MIDNIGHT::PROTOCOL - bright primary
color6  {{colors.tertiary.default.hex}}                   # THE NIGHT PERMITS... - different hue (tertiary)

# Normal text / labels (clean, not grey, not competing with headings)
color7  {{colors.on_surface.default.hex}}

# Bright/bold variants
color8  {{colors.outline.default.hex}}
color9  {{colors.error.default.hex}}
color10 {{colors.secondary.default.hex}}
color11 {{colors.tertiary.default.hex}}
color12 {{colors.primary.default.hex}}
color13 {{colors.primary.default.hex}}                    # extra bright heading support
color14 {{colors.tertiary.default.hex}}
color15 {{colors.on_surface.default.hex}}