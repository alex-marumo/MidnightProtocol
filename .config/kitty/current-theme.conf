$kitty-bg: #080808;

# Base - dark & stable background (matches AGS/wallpaper)
foreground            #e0e2ec
background            #080808
selection_foreground  #263500
selection_background  #b7d07b

cursor                #b7d07b
cursor_text_color     #263500

# ANSI colors
color0  #0b0e15   # very dark
color1  #ffb4ab                      # pink/red accents
color2  #e4bad9                  # blue/teal from wallpaper
color3  #acc8f8
color4  #b7d07b                    # main accent

# Headings - BRIGHT + DISTINCT (this is the key part you asked for)
color5  #b7d07b                    # MIDNIGHT::PROTOCOL - bright primary
color6  #acc8f8                   # THE NIGHT PERMITS... - different hue (tertiary)

# Normal text / labels (clean, not grey, not competing with headings)
color7  #e0e2ec

# Bright/bold variants
color8  #8b919f
color9  #ffb4ab
color10 #e4bad9
color11 #acc8f8
color12 #b7d07b
color13 #b7d07b                    # extra bright heading support
color14 #acc8f8
color15 #e0e2ec