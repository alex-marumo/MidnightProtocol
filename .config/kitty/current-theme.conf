$kitty-bg: #080808;

# Base - dark & stable background (matches AGS/wallpaper)
foreground            #f4ded5
background            #080808
selection_foreground  #0f2d68
selection_background  #b1c5ff

cursor                #b1c5ff
cursor_text_color     #0f2d68

# ANSI colors
color0  #160c07   # very dark
color1  #ffb4ab                      # pink/red accents
color2  #c0cc9a                  # blue/teal from wallpaper
color3  #a3d2a3
color4  #b1c5ff                    # main accent

# Headings - BRIGHT + DISTINCT (this is the key part you asked for)
color5  #b1c5ff                    # MIDNIGHT::PROTOCOL - bright primary
color6  #a3d2a3                   # THE NIGHT PERMITS... - different hue (tertiary)

# Normal text / labels (clean, not grey, not competing with headings)
color7  #f4ded5

# Bright/bold variants
color8  #a68b7f
color9  #ffb4ab
color10 #c0cc9a
color11 #a3d2a3
color12 #b1c5ff
color13 #b1c5ff                    # extra bright heading support
color14 #a3d2a3
color15 #f4ded5