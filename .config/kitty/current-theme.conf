$kitty-bg: #080808;

# Base - dark & stable background (matches AGS/wallpaper)
foreground            #f3dfd1
background            #080808
selection_foreground  #272968
selection_background  #c0c1ff

cursor                #c0c1ff
cursor_text_color     #272968

# ANSI colors
color0  #150c06   # very dark
color1  #ffb4ab                      # pink/red accents
color2  #b4cea5                  # blue/teal from wallpaper
color3  #97d4b3
color4  #c0c1ff                    # main accent

# Headings - BRIGHT + DISTINCT (this is the key part you asked for)
color5  #c0c1ff                    # MIDNIGHT::PROTOCOL - bright primary
color6  #97d4b3                   # THE NIGHT PERMITS... - different hue (tertiary)

# Normal text / labels (clean, not grey, not competing with headings)
color7  #f3dfd1

# Bright/bold variants
color8  #a48c7a
color9  #ffb4ab
color10 #b4cea5
color11 #97d4b3
color12 #c0c1ff
color13 #c0c1ff                    # extra bright heading support
color14 #97d4b3
color15 #f3dfd1