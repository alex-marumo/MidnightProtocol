$kitty-bg: #080808;

# Base - dark & stable background (matches AGS/wallpaper)
foreground            #f2dfd1
background            #080808
selection_foreground  #2b2867
selection_background  #c3c0ff

cursor                #c3c0ff
cursor_text_color     #2b2867

# ANSI colors
color0  #150c05   # very dark
color1  #ffb4ab                      # pink/red accents
color2  #b2cfa7                  # blue/teal from wallpaper
color3  #95d4b6
color4  #c3c0ff                    # main accent

# Headings - BRIGHT + DISTINCT (this is the key part you asked for)
color5  #c3c0ff                    # MIDNIGHT::PROTOCOL - bright primary
color6  #95d4b6                   # THE NIGHT PERMITS... - different hue (tertiary)

# Normal text / labels (clean, not grey, not competing with headings)
color7  #f2dfd1

# Bright/bold variants
color8  #a38d7a
color9  #ffb4ab
color10 #b2cfa7
color11 #95d4b6
color12 #c3c0ff
color13 #c3c0ff                    # extra bright heading support
color14 #95d4b6
color15 #f2dfd1