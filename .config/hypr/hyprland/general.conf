general {
    gaps_in = 1
    gaps_out = 2
    border_size = 1
    col.active_border = $primary
    col.inactive_border = $inactive
    resize_on_border = true
}

decoration {
    rounding = 2

    blur {
        enabled = true
        size = 4
        passes = 1
        xray = true
    }

    shadow {
        enabled = true
        range = 12
        offset = 0 6
        render_power = 3
        color = rgba(00000040)
    }

    dim_inactive = false
}

animations {
    enabled = true

    bezier = smooth, 0.25, 1, 0.5, 1

    animation = windowsIn, 1, 2, smooth, slide
    animation = windowsOut, 1, 1.5, smooth, slide
    animation = windowsMove, 1, 2, smooth

    animation = fadeIn, 1, 1, smooth
    animation = fadeOut, 1, 1, smooth

    animation = workspaces, 1, 2.5, smooth, slide
}

dwindle {
    preserve_split = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}