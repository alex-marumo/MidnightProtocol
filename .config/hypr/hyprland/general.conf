general {
    gaps_in = 1
    gaps_out = 2
    gaps_workspaces = 50
    border_size = 1
    col.active_border = rgba(0DB7D455)
    col.inactive_border = rgba(31313600)
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

decoration {
    rounding_power = 2.4
    rounding = 3

    blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 1
        passes = 1
        brightness = 1
        noise = 0.1
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 10
        offset = 0 4
        render_power = 3
        color = rgba(00000027)
    }

    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.07
}

animations {
    enabled = true

    bezier = quintOut, 0.23, 1, 0.32, 1

    animation = windowsIn, 1, 2.5, quintOut, slide
    animation = windowsOut, 1, 1.5, quintOut, slide
    animation = windowsMove, 1, 2, quintOut

    animation = fadeIn, 1, 1.2, quintOut
    animation = fadeOut, 1, 1.2, quintOut
    
    animation = layersIn, 1, 1.5, quintOut, fade
    animation = layersOut, 1, 1.2, quintOut, fade

    animation = workspaces, 1, 4, quintOut, slide
    animation = specialWorkspace, 1, 3, quintOut, slidevert
}

input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    follow_mouse = 1
    off_window_axis_events = 2
    sensitivity = 0.3

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = false
        scroll_factor = 0.7
    }
}

misc {
    disable_hyprland_logo = false
    disable_splash_rendering = false
    vfr = 0
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    session_lock_xray = true
    initial_workspace_tracking = false
    focus_on_activate = true
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

cursor {
    zoom_factor = 1
    zoom_rigid = false
    zoom_disable_aa = true
    hotspot_padding = 1
    no_hardware_cursors = false
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(000000)
        workspace_method = first 1
        enable_gesture = false
    }
}