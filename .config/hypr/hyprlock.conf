source = $HOME/.config/hypr/hyprlock/colors.conf

# ── Background ────────────────────────────────────────────────
background {
    monitor = eDP-1
    path = $HOME/Pictures/wallpapers/.current_wallpaper
    blur_size = 4
    blur_passes = 3
    brightness = 0.7
    contrast = 0.9
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# ── Hours ─────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<b><big>$(date +'%H')</big></b>"
    color = $text_color
    font_size = 112
    font_family = IosevkaTerm NF Medium
    shadow_passes = 3
    shadow_size = 4
    position = 0, 320
    halign = center
    valign = center
}

# ── Minutes ───────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<b><big>$(date +'%M')</big></b>"
    color = $text_color
    font_size = 112
    font_family = IosevkaTerm NF Medium
    shadow_passes = 3
    shadow_size = 4
    position = 0, 160
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:5000] date +'%A, %d %B'
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = 0, 80
    halign = center
    valign = center
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor = eDP-1
    size = 240, 42
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff55" font_desc="IosevkaTerm NF Medium 11">UNLOCK</span>
    position = 0, -60
    halign = center
    valign = center
}

# ── Caps lock warning ─────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 11
    font_family = $font_family
    position = 0, -110
    halign = center
    valign = center
}

# ── User ──────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = $USER
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, 56
    halign = center
    valign = bottom
}

# ── Status ────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 11
    font_family = $font_family
    position = 24, -24
    halign = left
    valign = top
}

# ── Layout indicator ──────────────────────────────────────────
label {
    monitor = eDP-1
    text = $LAYOUT
    color = $text_color
    font_size = 11
    font_family = $font_family
    position = -24, 24
    halign = right
    valign = bottom
}
