source = $HOME/.config/hypr/hyprlock/colors.conf

# ── Background ────────────────────────────────────────────────
background {
    monitor = eDP-1
    path = $HOME/Pictures/wallpapers/.current_wallpaper
    blur_size = 6
    blur_passes = 4
    brightness = 0.5
    contrast = 1.1
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# ── Hours ─────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<b><big>$(date +'%H')</big></b>"
    color = $text_color
    font_size = 112
    font_family = IosevkaTerm NF Medium
    shadow_passes = 5
    shadow_size = 8
    position = 0, 320
    halign = center
    valign = center
}

# ── Minutes ───────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<b><big>$(date +'%M')</big></b>"
    color = $text_color
    font_size = 112
    font_family = IosevkaTerm NF Medium
    shadow_passes = 3
    shadow_size = 4
    position = 0, 160
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<b><big>$(date +'%H')</big></b>"
    color = $primary_glow
    font_size = 112
    font_family = IosevkaTerm NF Medium
    shadow_passes = 8
    shadow_size = 12
    shadow_color = rgba({{colors.primary.default.hex_stripped}}44)
    position = 0, 320
    halign = center
    valign = center
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor = eDP-1
    size = 280, 48
    outline_thickness = 1
    rounding = 0
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##ffffff33" font_desc="IosevkaTerm NF Medium 10" letter_spacing="2048">UNLOCK</span>
    position = 0, -60
    halign = center
    valign = center
}

# ── Caps lock warning ─────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 10
    font_family = $font_family
    position = 0, -120
    halign = center
    valign = center
}

# ── User ──────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = $USER
    color = $text_color
    font_size = 12
    font_family = $font_family
    position = 0, 56
    halign = center
    valign = bottom
}

# ── Status ────────────────────────────────────────────────────
label {
    monitor = eDP-1
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_muted_color
    font_size = 10
    font_family = $font_family
    position = 24, -24
    halign = left
    valign = top
}

# ── Layout indicator ──────────────────────────────────────────
label {
    monitor = eDP-1
    text = $LAYOUT
    color = $text_muted_color
    font_size = 10
    font_family = $font_family
    position = -24, 24
    halign = right
    valign = bottom
}