source = ~/.config/hypr/hyprlock/colors.conf

# ── Background ────────────────────────────────────────────────
background {
    monitor =
    path = $background_image
    blur_size = 4
    blur_passes = 3
    brightness = 0.7
    contrast = 0.9
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

# ── Clock ─────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $text_color
    font_size = 80
    font_family = $font_family_clock
    position = 0, 180
    halign = center
    valign = center
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] date +"%A, %d %B"
    color = $text_color
    font_size = 14
    font_family = $font_family
    position = 0, 100
    halign = center
    valign = center
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor =
    size = 240, 42
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff55" font_desc="IosevkaTerm NF Medium 11">UNLOCK</span>
    position = 0, 20
    halign = center
    valign = center
}

# ── Caps lock warning ─────────────────────────────────────────
label {
    monitor =
    text = cmd[update:250] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/check-capslock.sh
    color = $text_color
    font_size = 11
    font_family = $font_family
    position = 0, -25
    halign = center
    valign = center
}

# ── User ──────────────────────────────────────────────────────
label {
    monitor =
    text =  $USER
    color = $text_color
    font_size = 13
    font_family = $font_family
    position = 0, 56
    halign = center
    valign = bottom
}

# ── Status (battery/uptime) ───────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 11
    font_family = $font_family
    position = 24, -24
    halign = left
    valign = top
}

# ── Layout indicator ──────────────────────────────────────────
label {
    monitor =
    text = $LAYOUT
    color = $text_color
    font_size = 11
    font_family = $font_family
    position = -24, 24
    halign = right
    valign = bottom
}